<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="appIconTitle appIconDesc">
  <title id="appIconTitle">RepoLens logo</title>
  <desc id="appIconDesc">Circular brand mark with three accent dots and grid lines</desc>
  <style>
    .brand-pulse{ transform-origin:center; animation:brandPulse 3s ease-in-out infinite }
    @keyframes brandPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
  </style>
  <rect x="3" y="3" width="42" height="42" rx="10" fill="#fbfdff" stroke="#e6eef8" />
  <g class="brand-pulse">
    <circle cx="24" cy="22" r="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.6" />
    <path d="M18 22h12M24 16v12" stroke="#0f172a" stroke-width="1.6" stroke-linecap="round" opacity="0.9" />
    <circle cx="17" cy="15" r="2" fill="#bfdbfe" />
    <circle cx="31" cy="15" r="2" fill="#d8b4fe" />
    <circle cx="24" cy="31" r="2" fill="#94a3b8" />
  </g>
</svg>