<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="fileTitle fileDesc">
	<title id="fileTitle">File icon</title>
	<desc id="fileDesc">A simple file card with folded corner</desc>
	<style>
	  .pulse{ transform-origin:center; animation:pulse 2.4s ease-in-out infinite }
	  .dash{ stroke-dasharray:6 4; animation:dash 2.8s linear infinite }
	  @keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.85}100%{transform:scale(1);opacity:1}}
	  @keyframes dash{to{stroke-dashoffset:-10}}
	</style>
	<rect x="6" y="8" width="44" height="48" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
	<path class="dash" d="M42 8v12a4 4 0 0 0 4 4h10" fill="#eef2ff" stroke="#93c5fd" stroke-width="1.5" opacity="0.9"/>
	<path class="dash" d="M20 28h24" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
	<path class="dash" d="M20 36h18" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
	<circle class="pulse" cx="22" cy="46" r="2" fill="#7c3aed" opacity="0.95" />
</svg>