<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="appIconTitle appIconDesc">
  <title id="appIconTitle">RepoLens</title>
  <desc id="appIconDesc">Lens aperture focusing on a connected hex-node architecture graph</desc>
  <style>
    .mark-light { display: block; }
    .mark-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .mark-light { display: none; }
      .mark-dark { display: block; }
    }
  </style>

  <!-- Light (default — matches app :root) -->
  <g class="mark-light">
    <defs>
      <radialGradient id="focusGlowLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24 17) scale(6)">
        <stop stop-color="#C7D2FE"/>
        <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect x="3" y="3" width="42" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <circle cx="24" cy="17" r="7" fill="url(#focusGlowLight)" opacity="0.55"/>
    <path d="M 11 19 A 13 13 0 0 1 37 19" stroke="#6366F1" stroke-width="2.25" stroke-linecap="round" fill="none"/>
    <path d="M 13.5 19 A 10.5 10.5 0 0 1 34.5 19" stroke="#818CF8" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
    <circle cx="24" cy="17" r="2.25" fill="#EEF2FF"/>
    <circle cx="24" cy="17" r="1.1" fill="#6366F1"/>
    <path d="M 24 19.5 L 14 29" stroke="#94A3B8" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 24 19.5 L 34 29" stroke="#94A3B8" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 24 19.5 L 24 31" stroke="#94A3B8" stroke-width="1.35" stroke-linecap="round"/>
    <polygon points="14,26.36 17.64,28.46 17.64,32.66 14,34.76 10.36,32.66 10.36,28.46" fill="rgba(124,58,237,0.14)" stroke="#7C3AED" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="34,26.36 37.64,28.46 37.64,32.66 34,34.76 30.36,32.66 30.36,28.46" fill="rgba(8,145,178,0.14)" stroke="#0891B2" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="24,31.8 27.64,33.9 27.64,38.1 24,40.2 20.36,38.1 20.36,33.9" fill="rgba(5,150,105,0.14)" stroke="#059669" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 14 31 L 24 36 L 34 31" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 14 31 L 34 31" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
    <line x1="9" y1="42.5" x2="39" y2="42.5" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="24" y1="40.5" x2="24" y2="44.5" stroke="#6366F1" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="16" y1="42.5" x2="16" y2="44" stroke="#CBD5E1" stroke-width="1" stroke-linecap="round"/>
    <line x1="32" y1="42.5" x2="32" y2="44" stroke="#CBD5E1" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Dark (OS dark preference / future app dark theme) -->
