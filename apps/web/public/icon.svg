    <path d="M 11 19 A 13 13 0 0 1 37 19" stroke="#818CF8" stroke-width="2.25" stroke-linecap="round" fill="none"/>
    <path d="M 13.5 19 A 10.5 10.5 0 0 1 34.5 19" stroke="#A5B4FC" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
    <circle cx="24" cy="17" r="2.25" fill="#EEF2FF"/>
    <circle cx="24" cy="17" r="1.1" fill="#818CF8"/>
    <path d="M 24 19.5 L 14 29" stroke="#475569" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 24 19.5 L 34 29" stroke="#475569" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 24 19.5 L 24 31" stroke="#475569" stroke-width="1.35" stroke-linecap="round"/>
    <polygon points="14,26.36 17.64,28.46 17.64,32.66 14,34.76 10.36,32.66 10.36,28.46" fill="rgba(124,58,237,0.22)" stroke="#A78BFA" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="34,26.36 37.64,28.46 37.64,32.66 34,34.76 30.36,32.66 30.36,28.46" fill="rgba(8,145,178,0.22)" stroke="#22D3EE" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="24,31.8 27.64,33.9 27.64,38.1 24,40.2 20.36,38.1 20.36,33.9" fill="rgba(16,185,129,0.22)" stroke="#34D399" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 14 31 L 24 36 L 34 31" stroke="#64748B" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 14 31 L 34 31" stroke="#64748B" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
    <line x1="9" y1="42.5" x2="39" y2="42.5" stroke="#1E293B" stroke-width="1"/>
    <line x1="24" y1="40.5" x2="24" y2="44.5" stroke="#818CF8" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="16" y1="42.5" x2="16" y2="44" stroke="#334155" stroke-width="1" stroke-linecap="round"/>
    <line x1="32" y1="42.5" x2="32" y2="44" stroke="#334155" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
