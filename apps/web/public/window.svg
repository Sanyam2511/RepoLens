<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="winTitle winDesc">
	<title id="winTitle">Window icon</title>
	<desc id="winDesc">Browser-like window illustration representing an app UI</desc>
	<style>
	  .win-dot{ transform-origin:center; animation:blink 2.2s infinite ease-in-out }
	  @keyframes blink{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
	</style>
	<rect x="6" y="10" width="52" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
	<rect x="8" y="14" width="48" height="8" rx="4" fill="#eef2ff" />
	<circle class="win-dot" cx="18" cy="18" r="2" fill="#f97316" />
	<circle class="win-dot" cx="26" cy="18" r="2" fill="#fbbf24" />
	<circle class="win-dot" cx="34" cy="18" r="2" fill="#10b981" />
	<rect x="12" y="26" width="40" height="18" rx="3" fill="#fff" stroke="#e6eef8" />
</svg>