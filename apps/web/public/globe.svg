<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="globeTitle globeDesc">
	<title id="globeTitle">External API icon</title>
	<desc id="globeDesc">Simplified globe representing external endpoints</desc>
	<style>
	  .globe-rotate{ transform-origin:32px 32px; animation:rot 8s linear infinite }
	  .globe-pulse{ transform-origin:center; animation:gpulse 2.6s ease-in-out infinite }
	  @keyframes rot{to{transform:rotate(360deg)}}
	  @keyframes gpulse{50%{transform:scale(1.15);opacity:0.85}}
	</style>
	<g class="globe-rotate">
	  <circle cx="32" cy="32" r="26" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
	  <path d="M6 32h52" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" opacity="0.9" />
	  <path d="M32 6c6 8 6 20 0 30-6-10-6-22 0-30z" stroke="#64748b" stroke-width="1.6" fill="none" opacity="0.9" />
	</g>
	<circle class="globe-pulse" cx="32" cy="32" r="3.2" fill="#0f766e" />
</svg>